name: Sync Upstream Releases

on:
  workflow_dispatch:
  schedule:
    - cron: '17 2 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate apps.json
        run: ruby -rjson -e 'JSON.parse(File.read("apps.json"))'

      - name: Sync managed upstream apps
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ruby scripts/sync_upstream.rb

      - name: Commit updated apps.json
        run: |
          if git diff --quiet -- apps.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps.json
          git commit -m "chore: sync upstream releases"
          git push
